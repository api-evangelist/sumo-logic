naftiko: "1.0.0-alpha1"

info:
  label: "Sumo Logic API"
  description: "Sumo Logic REST API for log analytics, observability, security, and cloud monitoring. Provides 289 endpoints across 54 resource domains."
  tags:
    - Logging
    - Observability
    - Security
    - Monitoring
    - Analytics
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SUMO_LOGIC_ACCESS_ID: SUMO_LOGIC_ACCESS_ID
      SUMO_LOGIC_ACCESS_KEY: SUMO_LOGIC_ACCESS_KEY

capability:
  consumes:
    - type: http
      namespace: sumo-logic
      baseUri: https://api.sumologic.com/api
      description: "Sumo Logic cloud-native log analytics and observability platform API."
      authentication:
        type: basic
        username: "{{SUMO_LOGIC_ACCESS_ID}}"
        password: "{{SUMO_LOGIC_ACCESS_KEY}}"
      resources:
        - name: users
          path: /v1/users
          description: "User account management"
          operations:
            - name: list-users
              method: GET
              description: "Get A List Of Users"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of users to return"
                - name: token
                  in: query
                  type: string
                  required: false
                  description: "Continuation token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Create A New User"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  roleIds: "{{tools.roleIds}}"
        - name: user
          path: /v1/users/{id}
          description: "Individual user operations"
          operations:
            - name: get-user
              method: GET
              description: "Get A User"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-user
              method: DELETE
              description: "Delete A User"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: roles
          path: /v1/roles
          description: "Role-based access control management"
          operations:
            - name: list-roles
              method: GET
              description: "Get A List Of Roles"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-role
              method: POST
              description: "Create A New Role"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  filterPredicate: "{{tools.filterPredicate}}"
        - name: dashboards
          path: /v2/dashboards
          description: "Dashboard management"
          operations:
            - name: list-dashboards
              method: GET
              description: "List Dashboards"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-dashboard
              method: POST
              description: "Create A New Dashboard"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  description: "{{tools.description}}"
        - name: monitors
          path: /v1/monitors
          description: "Alerting and monitoring management"
          operations:
            - name: list-monitors
              method: GET
              description: "List All Monitors"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-monitor
              method: POST
              description: "Create A Monitor"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  monitorType: "{{tools.monitorType}}"
                  queries: "{{tools.queries}}"
                  triggers: "{{tools.triggers}}"
        - name: access-keys
          path: /v1/accessKeys
          description: "Access key management"
          operations:
            - name: list-access-keys
              method: GET
              description: "List All Access Keys"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-access-key
              method: POST
              description: "Create An Access Key"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  label: "{{tools.label}}"
        - name: search-jobs
          path: /v1/search/jobs
          description: "Log search job execution"
          operations:
            - name: create-search-job
              method: POST
              description: "Create A Search Job"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  from: "{{tools.from}}"
                  to: "{{tools.to}}"
                  timeZone: "{{tools.timeZone}}"
        - name: ingest-budgets
          path: /v2/ingestBudgets
          description: "Ingestion budget management"
          operations:
            - name: list-ingest-budgets
              method: GET
              description: "Get A List Of Ingest Budgets"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sumo-logic-api
      resources:
        - path: /v1/users
          name: users
          description: "User management"
          operations:
            - method: GET
              name: list-users
              description: "List all users"
            - method: POST
              name: create-user
              description: "Create a user"
        - path: /v1/roles
          name: roles
          description: "Role management"
          operations:
            - method: GET
              name: list-roles
              description: "List all roles"
            - method: POST
              name: create-role
              description: "Create a role"
        - path: /v1/monitors
          name: monitors
          description: "Monitor management"
          operations:
            - method: GET
              name: list-monitors
              description: "List all monitors"

    - type: mcp
      port: 9100
      namespace: sumo-logic-mcp
      transport: http
      tools:
        - name: list-users
          description: "List all users in the organization"
          hints:
            readOnly: true
            idempotent: true
        - name: list-roles
          description: "List all roles in the organization"
          hints:
            readOnly: true
            idempotent: true
        - name: list-monitors
          description: "List all alerting monitors"
          hints:
            readOnly: true
            idempotent: true
        - name: list-dashboards
          description: "List all dashboards"
          hints:
            readOnly: true
            idempotent: true
        - name: create-search-job
          description: "Create a log search job"
          hints:
            readOnly: false
