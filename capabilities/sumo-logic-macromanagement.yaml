naftiko: 1.0.0-alpha2
info:
  label: Sumo Logic API — macroManagement
  description: 'Sumo Logic API — macroManagement. 5 operations. Lead operation: List All Macros.. Self-contained Naftiko capability
    covering one Sumo Logic business surface.'
  tags:
  - Sumo Logic
  - macroManagement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SUMO_LOGIC_API_KEY: SUMO_LOGIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: sumo-logic-macromanagement
    baseUri: https://api.au.sumologic.com/api
    description: Sumo Logic API — macroManagement business capability. Self-contained, no shared references.
    resources:
    - name: v2-macros
      path: /v2/macros
      operations:
      - name: listmacros
        method: GET
        description: List All Macros.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Limit the number of macro returned in the response. The number of macros returned may be less than
            the `limit`. Default 50.
        - name: token
          in: query
          type: string
          description: Continuation token to get the next page of results. A page object with the next continuation token
            is returned in the response body. Subsequent GET requests sho
      - name: createmacro
        method: POST
        description: Create A New Macro.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-macros-id
      path: /v2/macros/{id}
      operations:
      - name: getmacro
        method: GET
        description: Get A Macro.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: UUID of the macro.
          required: true
      - name: editmacro
        method: PUT
        description: Edit A Macro.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: UUID of the macro to edit.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemacro
        method: DELETE
        description: Delete A Macro.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Id of macro to delete.
          required: true
    authentication:
      type: basic
      username: '{{env.SUMO_LOGIC_USER}}'
      password: '{{env.SUMO_LOGIC_PASS}}'
  exposes:
  - type: rest
    namespace: sumo-logic-macromanagement-rest
    port: 8080
    description: REST adapter for Sumo Logic API — macroManagement. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/macros
      name: v2-macros
      description: REST surface for v2-macros.
      operations:
      - method: GET
        name: listmacros
        description: List All Macros.
        call: sumo-logic-macromanagement.listmacros
        with:
          limit: rest.limit
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createmacro
        description: Create A New Macro.
        call: sumo-logic-macromanagement.createmacro
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/macros/{id}
      name: v2-macros-id
      description: REST surface for v2-macros-id.
      operations:
      - method: GET
        name: getmacro
        description: Get A Macro.
        call: sumo-logic-macromanagement.getmacro
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: editmacro
        description: Edit A Macro.
        call: sumo-logic-macromanagement.editmacro
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemacro
        description: Delete A Macro.
        call: sumo-logic-macromanagement.deletemacro
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sumo-logic-macromanagement-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sumo Logic API — macroManagement. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-macros
      description: List All Macros.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sumo-logic-macromanagement.listmacros
      with:
        limit: tools.limit
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-macro
      description: Create A New Macro.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sumo-logic-macromanagement.createmacro
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-macro
      description: Get A Macro.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sumo-logic-macromanagement.getmacro
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: edit-macro
      description: Edit A Macro.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: sumo-logic-macromanagement.editmacro
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-macro
      description: Delete A Macro.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sumo-logic-macromanagement.deletemacro
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
