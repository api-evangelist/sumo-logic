    description: Sumo Logic API — userManagement business capability. Self-contained, no shared references.
    resources:
    - name: v1-users
      path: /v1/users
      operations:
      - name: listusers
        method: GET
        description: Get A List Of Users.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Limit the number of users returned in the response. The number of users returned may be less than the
            `limit`.
        - name: token
          in: query
          type: string
          description: Continuation token to get the next page of results. A page object with the next continuation token
            is returned in the response body. Subsequent GET requests sho
        - name: sortBy
          in: query
          type: string
          description: Sort the list of users by the `firstName`, `lastName`, or `email` field.
        - name: email
          in: query
          type: string
          description: Find user with the given email address.
        - name: includeServiceAccounts
          in: query
          type: boolean
          description: Include service accounts while listing users within the organization.
      - name: createuser
        method: POST
        description: Create A New User.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-users-id
      path: /v1/users/{id}
      operations:
      - name: getuser
        method: GET
        description: Get A User.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Identifier of user to return.
          required: true
      - name: updateuser
        method: PUT
        description: Update A User.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Identifier of the user to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Delete A User.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Identifier of the user to delete.
          required: true
        - name: transferTo
          in: query
          type: string
          description: 'Identifier of the user to receive the transfer of content from the deleted user. <br> **Note:** If
            `deleteContent` is not set to `true`, and no user identifier '
        - name: deleteContent
          in: query
          type: boolean
          description: 'Whether to delete content from the deleted user or not. <br> **Warning:** If `deleteContent` is set
            to `true`, all of the content for the user being deleted is '
