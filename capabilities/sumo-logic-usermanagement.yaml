      path: /v1/users/{id}/email/requestChange
      operations:
      - name: requestchangeemail
        method: POST
        description: Change Email Address.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Identifier of the user to change email address.
          required: true
        - name: body
          in: body
          type: object
