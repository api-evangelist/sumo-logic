    - name: provides-information-about-partitions-quota
      description: Provides Information About Partitions Quota.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sumo-logic-partitionmanagement.getpartitionsquota
      outputParameters:
      - type: object
        mapping: $.
    - name: get-partition
