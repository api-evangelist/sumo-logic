naftiko: 1.0.0-alpha2
info:
  label: Sumo Logic Log Analytics and Observability
  description: Workflow capability for DevOps and platform engineering teams using Sumo Logic for log analytics, monitoring,
    alerting, and security observability. Covers search jobs, dashboards, monitors, user management, and ingestion.
  tags:
  - Logging
  - Observability
  - Security
  - Monitoring
  - Analytics
  - DevOps
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SUMO_LOGIC_ACCESS_ID: SUMO_LOGIC_ACCESS_ID
    SUMO_LOGIC_ACCESS_KEY: SUMO_LOGIC_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: sumo-logic
    baseUri: https://api.sumologic.com/api
    description: Sumo Logic cloud-native log analytics and observability platform API.
    authentication:
      type: basic
      username: '{{SUMO_LOGIC_ACCESS_ID}}'
      password: '{{SUMO_LOGIC_ACCESS_KEY}}'
    resources:
    - name: users
      path: /v1/users
      description: User account management
      operations:
      - name: list-users
        method: GET
        description: Get A List Of Users
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of users to return
        - name: token
          in: query
          type: string
          required: false
          description: Continuation token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-user
        method: POST
        description: Create A New User
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            email: '{{tools.email}}'
            firstName: '{{tools.firstName}}'
            lastName: '{{tools.lastName}}'
            roleIds: '{{tools.roleIds}}'
    - name: user
      path: /v1/users/{id}
      description: Individual user operations
      operations:
      - name: get-user
        method: GET
        description: Get A User
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Unique identifier of the user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-user
        method: DELETE
        description: Delete A User
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: roles
      path: /v1/roles
      description: Role-based access control management
      operations:
      - name: list-roles
        method: GET
        description: Get A List Of Roles
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-role
        method: POST
        description: Create A New Role
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            description: '{{tools.description}}'
            filterPredicate: '{{tools.filterPredicate}}'
    - name: dashboards
      path: /v2/dashboards
      description: Dashboard management
      operations:
      - name: list-dashboards
        method: GET
        description: List Dashboards
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-dashboard
        method: POST
        description: Create A New Dashboard
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
            description: '{{tools.description}}'
    - name: monitors
      path: /v1/monitors
      description: Alerting and monitoring management
      operations:
      - name: list-monitors
        method: GET
        description: List All Monitors
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-monitor
        method: POST
        description: Create A Monitor
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            monitorType: '{{tools.monitorType}}'
            queries: '{{tools.queries}}'
            triggers: '{{tools.triggers}}'
    - name: access-keys
      path: /v1/accessKeys
      description: Access key management
      operations:
      - name: list-access-keys
        method: GET
        description: List All Access Keys
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-access-key
        method: POST
        description: Create An Access Key
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            label: '{{tools.label}}'
    - name: search-jobs
      path: /v1/search/jobs
      description: Log search job execution
      operations:
      - name: create-search-job
        method: POST
        description: Create A Search Job
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            from: '{{tools.from}}'
            to: '{{tools.to}}'
            timeZone: '{{tools.timeZone}}'
    - name: ingest-budgets
      path: /v2/ingestBudgets
      description: Ingestion budget management
      operations:
      - name: list-ingest-budgets
        method: GET
        description: Get A List Of Ingest Budgets
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: sumo-logic-observability-api
    description: Unified REST API for Sumo Logic log analytics and observability workflows.
    resources:
    - path: /v1/users
      name: users
      description: User account management
      operations:
      - method: GET
        name: list-users
        description: List all users in the organization
        call: sumo-logic.list-users
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-user
        description: Create a new user
        call: sumo-logic.create-user
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{id}
      name: user
      description: Individual user management
      operations:
      - method: GET
        name: get-user
        description: Get a user by ID
        call: sumo-logic.get-user
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-user
        description: Delete a user
        call: sumo-logic.delete-user
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/roles
      name: roles
      description: Role-based access control
      operations:
      - method: GET
        name: list-roles
        description: List all roles
        call: sumo-logic.list-roles
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-role
        description: Create a new role
        call: sumo-logic.create-role
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitors
      name: monitors
      description: Alerting monitors
      operations:
      - method: GET
        name: list-monitors
        description: List all monitors
        call: sumo-logic.list-monitors
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-monitor
        description: Create a new monitor
        call: sumo-logic.create-monitor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/dashboards
      name: dashboards
      description: Dashboard management
      operations:
      - method: GET
        name: list-dashboards
        description: List all dashboards
        call: sumo-logic.list-dashboards
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-dashboard
        description: Create a new dashboard
        call: sumo-logic.create-dashboard
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search-jobs
      name: search-jobs
      description: Log search execution
      operations:
      - method: POST
        name: create-search-job
        description: Run a log search query
        call: sumo-logic.create-search-job
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/access-keys
      name: access-keys
      description: Access key management
      operations:
      - method: GET
        name: list-access-keys
        description: List all access keys
        call: sumo-logic.list-access-keys
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-access-key
        description: Create a new access key
        call: sumo-logic.create-access-key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: sumo-logic-observability-mcp
    transport: http
    description: MCP server for AI-assisted log analytics and observability.
    tools:
    - name: list-users
      description: List all users in the Sumo Logic organization
      hints:
        readOnly: true
        idempotent: true
      call: sumo-logic.list-users
      with:
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get a specific Sumo Logic user by ID
      hints:
        readOnly: true
        idempotent: true
      call: sumo-logic.get-user
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-user
      description: Create a new Sumo Logic user
      hints:
        readOnly: false
      call: sumo-logic.create-user
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-user
      description: Delete a Sumo Logic user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sumo-logic.delete-user
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-roles
      description: List all roles for access control management
      hints:
        readOnly: true
        idempotent: true
      call: sumo-logic.list-roles
      outputParameters:
      - type: object
        mapping: $.
    - name: create-role
      description: Create a new role with specific capabilities and filter predicates
      hints:
        readOnly: false
      call: sumo-logic.create-role
      outputParameters:
      - type: object
        mapping: $.
    - name: list-monitors
      description: List all alerting monitors
      hints:
        readOnly: true
        idempotent: true
      call: sumo-logic.list-monitors
      outputParameters:
      - type: object
        mapping: $.
    - name: create-monitor
      description: Create a new alerting monitor with query and trigger conditions
      hints:
        readOnly: false
      call: sumo-logic.create-monitor
      outputParameters:
      - type: object
        mapping: $.
    - name: list-dashboards
      description: List all Sumo Logic dashboards
      hints:
        readOnly: true
        idempotent: true
      call: sumo-logic.list-dashboards
      outputParameters:
      - type: object
        mapping: $.
    - name: create-dashboard
      description: Create a new observability dashboard
      hints:
        readOnly: false
      call: sumo-logic.create-dashboard
      outputParameters:
      - type: object
        mapping: $.
    - name: run-log-search
      description: Execute a Sumo Logic log search query with time range
      hints:
        readOnly: true
        idempotent: false
      call: sumo-logic.create-search-job
      outputParameters:
      - type: object
        mapping: $.
    - name: list-access-keys
      description: List all API access keys
      hints:
        readOnly: true
        idempotent: true
      call: sumo-logic.list-access-keys
      outputParameters:
      - type: object
        mapping: $.
    - name: create-access-key
      description: Create a new API access key
      hints:
        readOnly: false
      call: sumo-logic.create-access-key
      outputParameters:
      - type: object
        mapping: $.
    - name: list-ingest-budgets
      description: List ingestion budgets for data volume management
      hints:
        readOnly: true
        idempotent: true
      call: sumo-logic.list-ingest-budgets
      outputParameters:
      - type: object
        mapping: $.
