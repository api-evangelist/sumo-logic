      operations:
      - name: recoversubdomains
        method: POST
        description: Recover Subdomains For A User.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: email
          in: query
          type: string
          description: Email address of the user to get subdomain information.
