naftiko: 1.0.0-alpha2
info:
  label: Sumo Logic API — accessKeyManagement
  description: 'Sumo Logic API — accessKeyManagement. 7 operations. Lead operation: List All Access Keys.. Self-contained
    Naftiko capability covering one Sumo Logic business surface.'
  tags:
  - Sumo Logic
  - accessKeyManagement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SUMO_LOGIC_API_KEY: SUMO_LOGIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: sumo-logic-accesskeymanagement
    baseUri: https://api.au.sumologic.com/api
    description: Sumo Logic API — accessKeyManagement business capability. Self-contained, no shared references.
    resources:
    - name: v1-accessKeys
      path: /v1/accessKeys
      operations:
      - name: listaccesskeys
        method: GET
        description: List All Access Keys.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Limit the number of access keys returned in the response. The number of access keys returned may be
            less than the `limit`.
        - name: token
          in: query
          type: string
          description: Continuation token to get the next page of results. A page object with the next continuation token
            is returned in the response body. Subsequent GET requests sho
      - name: createaccesskey
        method: POST
        description: Create An Access Key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-accessKeys-personal
      path: /v1/accessKeys/personal
      operations:
      - name: listpersonalaccesskeys
        method: GET
        description: List Personal Keys.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-accessKeys-scopes
      path: /v1/accessKeys/scopes
      operations:
      - name: listscopes
        method: GET
        description: Get All Scopes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-accessKeys-id
      path: /v1/accessKeys/{id}
      operations:
      - name: updateaccesskey
        method: PUT
        description: Update An Access Key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The accessId of the access key to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteaccesskey
        method: DELETE
        description: Delete An Access Key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The accessId of the access key to delete.
          required: true
    - name: v1-accessKeys-id-rotate
      path: /v1/accessKeys/{id}/rotate
      operations:
      - name: rotateaccesskeysecret
        method: PUT
        description: Rotate The Access Key Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The accessId of the access key to rotate the secret for.
          required: true
    authentication:
      type: basic
      username: '{{env.SUMO_LOGIC_USER}}'
      password: '{{env.SUMO_LOGIC_PASS}}'
  exposes:
  - type: rest
    namespace: sumo-logic-accesskeymanagement-rest
    port: 8080
    description: REST adapter for Sumo Logic API — accessKeyManagement. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/accesskeys
      name: v1-accesskeys
      description: REST surface for v1-accessKeys.
      operations:
      - method: GET
        name: listaccesskeys
        description: List All Access Keys.
        call: sumo-logic-accesskeymanagement.listaccesskeys
        with:
          limit: rest.limit
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createaccesskey
        description: Create An Access Key.
        call: sumo-logic-accesskeymanagement.createaccesskey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/accesskeys/personal
      name: v1-accesskeys-personal
      description: REST surface for v1-accessKeys-personal.
      operations:
      - method: GET
        name: listpersonalaccesskeys
        description: List Personal Keys.
        call: sumo-logic-accesskeymanagement.listpersonalaccesskeys
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/accesskeys/scopes
      name: v1-accesskeys-scopes
      description: REST surface for v1-accessKeys-scopes.
      operations:
      - method: GET
        name: listscopes
        description: Get All Scopes.
        call: sumo-logic-accesskeymanagement.listscopes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/accesskeys/{id}
      name: v1-accesskeys-id
      description: REST surface for v1-accessKeys-id.
      operations:
      - method: PUT
        name: updateaccesskey
        description: Update An Access Key.
        call: sumo-logic-accesskeymanagement.updateaccesskey
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteaccesskey
        description: Delete An Access Key.
        call: sumo-logic-accesskeymanagement.deleteaccesskey
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/accesskeys/{id}/rotate
      name: v1-accesskeys-id-rotate
      description: REST surface for v1-accessKeys-id-rotate.
      operations:
      - method: PUT
        name: rotateaccesskeysecret
        description: Rotate The Access Key Secret
        call: sumo-logic-accesskeymanagement.rotateaccesskeysecret
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sumo-logic-accesskeymanagement-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sumo Logic API — accessKeyManagement. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-access-keys
      description: List All Access Keys.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sumo-logic-accesskeymanagement.listaccesskeys
      with:
        limit: tools.limit
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
    - name: create-access-key
      description: Create An Access Key.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sumo-logic-accesskeymanagement.createaccesskey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-personal-keys
      description: List Personal Keys.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sumo-logic-accesskeymanagement.listpersonalaccesskeys
      outputParameters:
      - type: object
        mapping: $.
    - name: get-all-scopes
      description: Get All Scopes.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sumo-logic-accesskeymanagement.listscopes
      outputParameters:
      - type: object
        mapping: $.
    - name: update-access-key
      description: Update An Access Key.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: sumo-logic-accesskeymanagement.updateaccesskey
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-access-key
      description: Delete An Access Key.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sumo-logic-accesskeymanagement.deleteaccesskey
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: rotate-access-key-secret
      description: Rotate The Access Key Secret
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: sumo-logic-accesskeymanagement.rotateaccesskeysecret
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
