  - type: http
    namespace: sumo-logic-budgetmanagement
    baseUri: https://api.au.sumologic.com/api
    description: Sumo Logic API — budgetManagement business capability. Self-contained, no shared references.
    resources:
    - name: v1-budgets
      path: /v1/budgets
      operations:
      - name: getbudgets
        method: GET
        description: Get Budgets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Limit the number of budgets returned in the response. The number of budgets returned may be less than
            the `limit`.
        - name: token
          in: query
          type: string
          description: Continuation token to get the next page of results. A page object with the next continuation token
            is returned in the response body. Subsequent GET requests sho
      - name: createbudget
        method: POST
        description: Creates A Budget Definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-budgets-usage
      path: /v1/budgets/usage
      operations:
      - name: getbudgetusages
        method: GET
        description: Get Budget Usages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Limit the number of budget usages returned in the response. The number of budget usages returned may
            be less than the `limit`.
        - name: token
          in: query
          type: string
          description: Continuation token to get the next page of results. A page object with the next continuation token
            is returned in the response body. Subsequent GET requests sho
    - name: v1-budgets-budgetId
      path: /v1/budgets/{budgetId}
      operations:
      - name: getbudget
        method: GET
        description: Get Budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budgetId
          in: path
          type: string
          description: The id of the budget.
          required: true
      - name: updatebudget
        method: PUT
        description: Update Budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budgetId
          in: path
          type: string
          description: The id of the budget.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebudget
        method: DELETE
        description: Delete Budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budgetId
          in: path
          type: string
          description: The id of the budget.
          required: true
    - name: v1-budgets-budgetId-usage
      path: /v1/budgets/{budgetId}/usage
      operations:
      - name: getbudgetusage
        method: GET
        description: Get Budget Usage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budgetId
          in: path
          type: string
          description: The id of the budget.
          required: true
    authentication:
      type: basic
      username: '{{env.SUMO_LOGIC_USER}}'
      password: '{{env.SUMO_LOGIC_PASS}}'
  exposes:
  - type: rest
    namespace: sumo-logic-budgetmanagement-rest
    port: 8080
    description: REST adapter for Sumo Logic API — budgetManagement. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/budgets
      name: v1-budgets
      description: REST surface for v1-budgets.
      operations:
      - method: GET
        name: getbudgets
        description: Get Budgets
        call: sumo-logic-budgetmanagement.getbudgets
        with:
          limit: rest.limit
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbudget
        description: Creates A Budget Definition
        call: sumo-logic-budgetmanagement.createbudget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/budgets/usage
      name: v1-budgets-usage
      description: REST surface for v1-budgets-usage.
      operations:
      - method: GET
        name: getbudgetusages
        description: Get Budget Usages
        call: sumo-logic-budgetmanagement.getbudgetusages
        with:
          limit: rest.limit
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/budgets/{budgetid}
      name: v1-budgets-budgetid
      description: REST surface for v1-budgets-budgetId.
      operations:
