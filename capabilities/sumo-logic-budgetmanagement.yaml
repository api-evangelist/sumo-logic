naftiko: 1.0.0-alpha2
info:
  label: Sumo Logic API — budgetManagement
  description: 'Sumo Logic API — budgetManagement. 7 operations. Lead operation: Get Budgets. Self-contained Naftiko capability
    covering one Sumo Logic business surface.'
  tags:
  - Sumo Logic
  - budgetManagement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SUMO_LOGIC_API_KEY: SUMO_LOGIC_API_KEY
capability:
