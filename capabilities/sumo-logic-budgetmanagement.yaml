        call: sumo-logic-budgetmanagement.updatebudget
        with:
          budgetId: rest.budgetId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletebudget
        description: Delete Budget
        call: sumo-logic-budgetmanagement.deletebudget
        with:
          budgetId: rest.budgetId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/budgets/{budgetid}/usage
      name: v1-budgets-budgetid-usage
      description: REST surface for v1-budgets-budgetId-usage.
      operations:
      - method: GET
        name: getbudgetusage
        description: Get Budget Usage
        call: sumo-logic-budgetmanagement.getbudgetusage
        with:
          budgetId: rest.budgetId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
