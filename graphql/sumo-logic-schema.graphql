  capabilities: [String!]
  systemDefined: Boolean
  created: DateTime
  modified: DateTime
  createdBy: String
  modifiedBy: String
}

type RolePage {
  data: [Role!]!
  next: String
}

type Permission {
  permissionType: PermissionType!
  sourceType: String!
  sourceId: String!
  contentId: String!
  grantedTo: String!
  grantedAt: DateTime
}

# ─── Organization ────────────────────────────────────────────────────────────

type Organization {
  orgId: String!
  orgName: String!
  environment: String!
  tier: String
  credits: Int
  maxUsersAllowed: Int
  maxConcurrentSearches: Int
  created: DateTime
  modified: DateTime
}

# ─── Partitions ──────────────────────────────────────────────────────────────

type PartitionDetails {
  id: ID!
  name: String!
  routingExpression: String!
  analyticsTier: String
  retentionPeriod: Int
  isCompliant: Boolean
  dataForwardingId: String
  totalBytes: Long
  isActive: Boolean
  indexType: String
  created: DateTime
  modified: DateTime
}

type PartitionPage {
  data: [PartitionDetails!]!
  next: String
}

type PartitionInfo {
  id: ID!
  name: String!
  routingExpression: String!
  analyticsTier: String
  retentionPeriod: Int
  totalBytes: Long
  isActive: Boolean
}

# ─── Fields ──────────────────────────────────────────────────────────────────

type Field {
  fieldId: ID!
  fieldName: String!
  dataType: String!
  state: String!
}

# ─── Tokens & API Keys ───────────────────────────────────────────────────────

type Token {
  id: ID!
  name: String!
  description: String
  type: String!
  status: String!
  created: DateTime
  modified: DateTime
  createdBy: String
  modifiedBy: String
}

type APIKey {
  id: ID!
  name: String!
  accessId: String!
  accessKey: String
  corsHeaders: [String!]
  created: DateTime
  modified: DateTime
  createdBy: String
  modifiedBy: String
}

# ─── Rate Limits ─────────────────────────────────────────────────────────────

type RateLimitInfo {
  requestsPerMinute: Int!
  requestsPerHour: Int!
  remainingRequestsPerMinute: Int!
  remainingRequestsPerHour: Int!
  resetAtMinute: DateTime
  resetAtHour: DateTime
}

# ─── Mutations ───────────────────────────────────────────────────────────────

type Mutation {
  # Collectors
  createHostedCollector(input: CollectorInput!): HostedCollector!
  updateHostedCollector(id: ID!, input: CollectorInput!): HostedCollector!
  deleteCollector(id: ID!): Boolean!

  # Sources
  createSource(collectorId: ID!, input: SourceInput!): Source!
  updateSource(collectorId: ID!, sourceId: ID!, input: SourceInput!): Source!
  deleteSource(collectorId: ID!, sourceId: ID!): Boolean!

  # Search Jobs
  createSearchJob(input: SearchJobInput!): SearchJob!
  deleteSearchJob(id: ID!): Boolean!

  # Dashboards
  createDashboard(input: DashboardInput!): DashboardDetails!
  updateDashboard(id: ID!, input: DashboardInput!): DashboardDetails!
  deleteDashboard(id: ID!): Boolean!

  # Monitors
  createMonitor(input: MonitorInput!): MonitorDetails!
  updateMonitor(id: ID!, input: MonitorInput!): MonitorDetails!
  deleteMonitor(id: ID!): Boolean!

  # Users
  createUser(input: UserInput!): UserDetails!
  updateUser(id: ID!, input: UserInput!): UserDetails!
  deleteUser(id: ID!): Boolean!
  assignRoleToUser(userId: ID!, roleId: ID!): UserDetails!
  removeRoleFromUser(userId: ID!, roleId: ID!): UserDetails!

  # Roles
  createRole(input: RoleInput!): Role!
  updateRole(id: ID!, input: RoleInput!): Role!
  deleteRole(id: ID!): Boolean!

  # Partitions
  createPartition(input: PartitionInput!): PartitionDetails!
  updatePartition(id: ID!, input: PartitionInput!): PartitionDetails!
  cancelRetentionUpdate(id: ID!): Boolean!

  # Fields
  createField(fieldName: String!): Field!
  deleteField(fieldName: String!): Boolean!

  # Tokens
  createToken(input: TokenInput!): Token!
  updateToken(id: ID!, input: TokenInput!): Token!
  deleteToken(id: ID!): Boolean!

  # Connections (Webhooks)
  createConnection(input: AlertConnectionInput!): AlertConnection!
  updateConnection(id: ID!, input: AlertConnectionInput!): AlertConnection!
  deleteConnection(id: ID!): Boolean!
}

# ─── Input Types ─────────────────────────────────────────────────────────────

input CollectorInput {
  name: String!
  description: String
  category: String
  fields: [LogFieldInput!]
  timezone: String
  ephemeral: Boolean
  targetCpu: Int
}

input LogFieldInput {
  name: String!
  value: String!
}

input SourceInput {
  name: String!
  description: String
  category: String
  sourceType: SourceType!
  encoding: String
  multilineProcessingEnabled: Boolean
  useAutolineMatching: Boolean
  forceTimeZone: Boolean
  fields: [LogFieldInput!]
}

input SearchJobInput {
  query: String!
  from: DateTime!
  to: DateTime!
  timeZone: String!
  byReceiptTime: Boolean
  autoParsingMode: String
}

input DashboardInput {
  title: String!
  description: String
  folderId: String
  topologyLabelMap: JSON
  domain: String
  refreshInterval: Int
  timeRange: JSON
  theme: String
  panels: [PanelInput!]
}

input PanelInput {
  key: String!
  title: String
  panelType: String!
  chartType: PanelChartType
  queries: [PanelQueryInput!]
  visualSettings: JSON
}

input PanelQueryInput {
  queryString: String!
  queryType: String!
  queryKey: String!
}

input MonitorInput {
  name: String!
  description: String
  type: String!
  queries: [MonitorQueryInput!]!
  triggers: [MonitorConditionInput!]
  notifications: [JSON]
  playbook: String
}

input MonitorQueryInput {
  rowId: String!
  query: String!
  queryType: String!
}

input MonitorConditionInput {
  detectionMethod: String!
  triggerType: String!
  threshold: Float
  thresholdType: String
  timeRange: String
}

input UserInput {
  firstName: String!
  lastName: String!
  email: String!
  roleIds: [String!]
}

input RoleInput {
  name: String!
  description: String
  filterPredicate: String
  capabilities: [String!]
}

input PartitionInput {
  name: String!
  routingExpression: String!
  analyticsTier: String
  retentionPeriod: Int
  isCompliant: Boolean
}

input TokenInput {
  name: String!
  description: String
  type: String!
  status: String!
}

input AlertConnectionInput {
  type: String!
  name: String!
  description: String
  url: String!
  headers: [LogFieldInput!]
  defaultPayload: String
  webhooks: [AlertWebhookInput!]
}

input AlertWebhookInput {
  url: String!
  method: WebhookMethod!
  headers: [LogFieldInput!]
  payload: String
  resolution: Boolean
}
