  modified: DateTime
  createdBy: String
  modifiedBy: String
}

type UserDetails {
  id: ID!
  firstName: String!
  lastName: String!
  email: String!
  roleIds: [String!]
  isActive: Boolean
  isMfaEnabled: Boolean
  lastLoginTimestamp: DateTime
  created: DateTime
  modified: DateTime
  createdBy: String
  modifiedBy: String
}

type UserPage {
  data: [User!]!
  next: String
}

type UserRole {
  userId: ID!
  roleId: ID!
  assignedAt: DateTime
}

type Role {
  id: ID!
  name: String!
  description: String
  filterPredicate: String
